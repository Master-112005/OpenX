<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>OpenX Alert</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <main class="alert-shell" role="dialog" aria-modal="true" aria-labelledby="alert-title">
    <div class="drag-region" aria-hidden="true"></div>
    <div class="alert-symbol" id="alert-symbol" aria-hidden="true">&#9201;&#65039;</div>
    <div class="alert-kind" id="alert-kind">Timer</div>
    <h1 id="alert-title">Timer complete</h1>
    <p id="alert-message">It is time.</p>
    <time id="alert-time"></time>
    <div class="alert-actions">
      <button class="glass-button" id="snooze-btn" type="button">Snooze 5 min</button>
      <button class="glass-button primary" id="stop-btn" type="button">Stop</button>
    </div>
  </main>
  <script src="./index.js"></script>
</body>
</html>
