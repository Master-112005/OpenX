<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'none'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>Assistant Settings</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="card">
    <div class="app-icon" aria-hidden="true"><span></span></div>
    <h1 id="title">Assistant Settings</h1>
    <div class="meta" id="meta">Preferences are available in your assistant workspace.</div>
    <p>
      Open the assistant to manage identity, profile, appearance, access, app modes,
      and voice preferences in one place.
    </p>
    <div class="btn-row">
      <button id="open-chat-settings">Open Assistant</button>
      <button class="secondary" id="close-window">Close</button>
    </div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
