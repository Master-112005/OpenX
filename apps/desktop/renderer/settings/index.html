<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'none'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
  <title>Assistant Settings</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <div class="card">
    <h1 id="title">Assistant Settings</h1>
    <div class="meta" id="meta">Settings now live inside the chat window.</div>
    <p>
      Use the in-chat Settings panel to update the assistant name, your profile details,
      the chat theme, and saved contacts. This keeps the settings flow close to the place
      where you actually use the assistant.
    </p>
    <div class="btn-row">
      <button id="open-chat-settings">Open Chat</button>
      <button class="secondary" id="close-window">Close</button>
    </div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
